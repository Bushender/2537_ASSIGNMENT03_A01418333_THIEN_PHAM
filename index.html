<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokeMemory</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
    crossorigin="anonymous"
  >
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;800;900&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="navbar navbar-dark" id="mainNav">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="pokemonlogo.png" alt="Pokemon" class="nav-logo">
      </a>
      <button class="btn btn-outline-light btn-sm" id="themeBtn">Dark Mode</button>
    </div>
  </nav>

  <div class="controls-bar">
    <div class="container-fluid d-flex flex-wrap align-items-center justify-content-center gap-3 py-3">

      <div class="d-flex align-items-center gap-2">
        <span class="controls-label">Difficulty:</span>
        <div class="btn-group" role="group">
          <button class="btn btn-difficulty active" data-diff="easy">Easy</button>
          <button class="btn btn-difficulty" data-diff="medium">Medium</button>
          <button class="btn btn-difficulty" data-diff="hard">Hard</button>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary" id="startBtn">Start</button>
        <button class="btn btn-warning" id="resetBtn">Reset</button>
        <button class="btn btn-success" id="peekBtn" disabled>Peek (1)</button>
      </div>

    </div>
  </div>

  <div class="status-bar py-3">
    <div class="container-fluid d-flex flex-wrap justify-content-center gap-3">

      <div class="stat-card">
        <span class="stat-value" id="timerVal">--</span>
        <span class="stat-label">Time Left</span>
      </div>

      <div class="stat-card">
        <span class="stat-value" id="clicksVal">0</span>
        <span class="stat-label">Clicks</span>
      </div>

      <div class="stat-card">
        <span class="stat-value" id="matchedVal">0</span>
        <span class="stat-label">Matched</span>
      </div>

      <div class="stat-card">
        <span class="stat-value" id="leftVal">--</span>
        <span class="stat-label">Pairs Left</span>
      </div>

      <div class="stat-card">
        <span class="stat-value" id="totalVal">--</span>
        <span class="stat-label">Total Pairs</span>
      </div>

    </div>
  </div>

  <div class="game-area d-flex flex-column align-items-center py-4">
    <div id="placeholder" class="text-center py-5">
      <p class="placeholder-text">Choose a difficulty and press Start!</p>
    </div>
    <div id="game_grid" style="display:none;"></div>
  </div>

  <div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content result-modal-content">
        <div class="modal-body text-center py-5">
          <h2 class="modal-title-text" id="modalTitle"></h2>
          <p class="modal-sub-text mt-2" id="modalSub"></p>
          <button class="btn btn-primary mt-4 px-5" id="modalPlayAgain">Play Again</button>
          <button class="btn btn-outline-secondary mt-4 px-5" id="modalExit">Exit</button>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
    crossorigin="anonymous"
  ></script>
  <script src="index.js"></script>

</body>

</html>
